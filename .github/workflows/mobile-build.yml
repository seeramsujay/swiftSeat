name: Build Mobile APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: 🚀 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🛠 Build APK
        working-directory: ./mobile
        run: eas build --platform android --profile preview --non-interactive --local --output ./build-output/app.apk

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: mobile/build-output/app.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
